<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>SMMPilot CRM</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #0f1220;
    --card: #171b2e;
    --accent: #6c5ce7;
    --accent2: #00cec9;
    --text: #eaeaf5;
    --muted: #8b8fa8;
    --danger: #ff6b6b;
    --success: #00d68f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding-bottom: 90px;
  }
  header {
    padding: 20px 16px 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
  }
  header h1 { margin: 0; font-size: 20px; }
  header p { margin: 4px 0 0; opacity: .85; font-size: 13px; }
  .tabs {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; background: var(--card);
    border-top: 1px solid rgba(255,255,255,.08);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .tab {
    flex: 1; text-align: center; padding: 12px 4px;
    font-size: 11px; color: var(--muted); cursor: pointer;
  }
  .tab.active { color: var(--accent2); }
  .tab .icon { font-size: 18px; display: block; margin-bottom: 2px; }
  main { padding: 16px; }
  .view { display: none; }
  .view.active { display: block; }
  .card {
    background: var(--card); border-radius: 14px; padding: 14px;
    margin-bottom: 12px; border: 1px solid rgba(255,255,255,.06);
  }
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .stat-grid .card { text-align: center; padding: 12px 6px; }
  .stat-grid .num { font-size: 22px; font-weight: 700; }
  .stat-grid .label { font-size: 11px; color: var(--muted); margin-top: 2px; }
  h3 { margin: 0 0 8px; font-size: 15px; }
  .row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .muted { color: var(--muted); font-size: 12px; }
  input, textarea, select {
    width: 100%; background: #10142450; border: 1px solid rgba(255,255,255,.12);
    color: var(--text); border-radius: 10px; padding: 10px; font-size: 14px;
    margin-bottom: 10px; font-family: inherit;
  }
  textarea { min-height: 80px; resize: vertical; }
  button {
    border: none; border-radius: 10px; padding: 10px 14px;
    font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .btn-primary { background: var(--accent); color: #fff; width: 100%; }
  .btn-danger { background: rgba(255,107,107,.15); color: var(--danger); }
  .btn-ghost { background: rgba(255,255,255,.06); color: var(--text); }
  .chip {
    display: inline-block; padding: 3px 8px; border-radius: 20px;
    font-size: 11px; margin: 2px 3px 2px 0;
  }
  .chip.on { background: rgba(0,214,143,.15); color: var(--success); }
  .chip.off { background: rgba(255,255,255,.06); color: var(--muted); }
  .day-btn {
    display: inline-block; width: 32px; height: 32px; line-height: 32px;
    text-align: center; border-radius: 8px; margin: 2px; font-size: 12px;
    background: rgba(255,255,255,.06); color: var(--muted); cursor: pointer;
  }
  .day-btn.sel { background: var(--accent); color: #fff; }
  .empty { text-align: center; color: var(--muted); padding: 30px 10px; font-size: 13px; }
  .error { color: var(--danger); font-size: 13px; padding: 10px; }
  .fab {
    position: fixed; right: 16px; bottom: 82px; width: 52px; height: 52px;
    border-radius: 50%; background: var(--accent); color: #fff; font-size: 24px;
    display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 16px rgba(108,92,231,.5);
  }
  .modal-bg {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    z-index: 20; align-items: flex-end;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--card); border-radius: 18px 18px 0 0; padding: 18px;
    width: 100%; max-height: 85vh; overflow-y: auto;
  }
  .modal-close { float: right; color: var(--muted); font-size: 20px; cursor: pointer; }
</style>
</head>
<body>

<header>
  <h1>🤖 SMMPilot CRM</h1>
  <p id="whoami">Загрузка...</p>
</header>

<main>
  <div class="view active" id="view-dashboard">
    <div class="stat-grid" id="stat-grid">
      <div class="card"><div class="num">—</div><div class="label">Всего</div></div>
      <div class="card"><div class="num">—</div><div class="label">Успешно</div></div>
      <div class="card"><div class="num">—</div><div class="label">Ошибок</div></div>
    </div>
    <div class="card">
      <h3>📊 По кампаниям</h3>
      <div id="per-campaign-stats" class="empty">Нет данных</div>
    </div>
  </div>

  <div class="view" id="view-campaigns">
    <div id="campaigns-list" class="empty">Загрузка...</div>
  </div>

  <div class="view" id="view-groups">
    <div class="card">
      <h3>👥 Группы бота</h3>
      <p class="muted">Добавляются командой /addhere прямо в группе. Список ниже — только просмотр.</p>
    </div>
    <div id="groups-list" class="empty">Загрузка...</div>
  </div>
</main>

<div class="tabs">
  <div class="tab active" data-view="dashboard"><span class="icon">📊</span>Статистика</div>
  <div class="tab" data-view="campaigns"><span class="icon">📋</span>Кампании</div>
  <div class="tab" data-view="groups"><span class="icon">👥</span>Группы</div>
</div>

<div class="fab" id="fab-new" style="display:none">+</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <span class="modal-close" id="modal-close">✕</span>
    <div id="modal-content"></div>
  </div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }
const initData = tg?.initData || "";

const DAYS = [["mon","Пн"],["tue","Вт"],["wed","Ср"],["thu","Чт"],["fri","Пт"],["sat","Сб"],["sun","Вс"]];

async function api(path, opts = {}) {
  const res = await fetch(path, {
    ...opts,
    headers: { "Content-Type": "application/json", "X-Init-Data": initData, ...(opts.headers || {}) }
  });
  if (!res.ok) {
    const body = await res.json().catch(() => ({ error: "Ошибка запроса" }));
    throw new Error(body.error || `HTTP ${res.status}`);
  }
  return res.json();
}

let ME = null;

function switchView(name) {
  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById("view-" + name).classList.add("active");
  document.querySelector(`.tab[data-view="${name}"]`).classList.add("active");
  document.getElementById("fab-new").style.display = name === "campaigns" ? "flex" : "none";
  if (name === "dashboard") loadStats();
  if (name === "campaigns") loadCampaigns();
  if (name === "groups") loadGroups();
}

document.querySelectorAll(".tab").forEach(t => t.addEventListener("click", () => switchView(t.dataset.view)));

function openModal(html) {
  document.getElementById("modal-content").innerHTML = html;
  document.getElementById("modal-bg").classList.add("open");
}
function closeModal() {
  document.getElementById("modal-bg").classList.remove("open");
}
document.getElementById("modal-close").onclick = closeModal;
document.getElementById("modal-bg").onclick = (e) => { if (e.target.id === "modal-bg") closeModal(); };

async function init() {
  try {
    ME = await api("/api/me");
    document.getElementById("whoami").textContent =
      `${ME.first_name || "Пользователь"}${ME.is_admin ? " · Администратор" : ""}`;
    loadStats();
  } catch (e) {
    document.getElementById("whoami").textContent = "Ошибка авторизации";
    document.querySelector("main").innerHTML = `<div class="error">${e.message}</div>`;
  }
}

async function loadStats() {
  const box = document.getElementById("per-campaign-stats");
  const grid = document.getElementById("stat-grid");
  try {
    const s = await api("/api/stats" + (ME?.is_admin ? "?all=1" : ""));
    const totals = s.totals || { total: s.total_posts || 0, success: s.successful || 0, failed: 0 };
    grid.innerHTML = `
      <div class="card"><div class="num">${totals.total ?? s.total_posts ?? 0}</div><div class="label">Всего</div></div>
      <div class="card"><div class="num" style="color:var(--success)">${totals.success ?? s.successful ?? 0}</div><div class="label">Успешно</div></div>
      <div class="card"><div class="num" style="color:var(--danger)">${totals.failed ?? 0}</div><div class="label">Ошибок</div></div>`;
    const per = s.per_campaign || [];
    box.innerHTML = per.length ? per.map(c => `
      <div class="row" style="padding:6px 0;border-bottom:1px solid rgba(255,255,255,.06)">
        <span>${c.name}</span>
        <span class="muted">✅ ${c.success} · ❌ ${c.failed}</span>
      </div>`).join("") : '<div class="empty">Нет кампаний со статистикой</div>';
  } catch (e) {
    box.innerHTML = `<div class="error">${e.message}</div>`;
  }
}

async function loadCampaigns() {
  const box = document.getElementById("campaigns-list");
  box.innerHTML = '<div class="empty">Загрузка...</div>';
  try {
    const list = await api("/api/campaigns" + (ME?.is_admin ? "?all=1" : ""));
    if (!list.length) { box.innerHTML = '<div class="empty">Пока нет кампаний. Нажмите +</div>'; return; }
    box.innerHTML = list.map(c => `
      <div class="card">
        <div class="row">
          <h3 style="margin:0">${c.name}</h3>
          <span class="chip ${c.spintax_enabled === '1' ? 'on' : 'off'}">${c.spintax_enabled === '1' ? 'Spintax' : 'Обычный текст'}</span>
        </div>
        <p class="muted" style="white-space:pre-wrap">${c.text.slice(0, 120)}${c.text.length > 120 ? '…' : ''}</p>
        <div class="row">
          <span class="muted">📅 ${(c.schedules || []).length} расписаний</span>
          <span>
            <button class="btn-ghost" onclick="openSchedules('${c.campaign_id}')">Расписание</button>
            <button class="btn-danger" onclick="deleteCampaign('${c.campaign_id}')">Удалить</button>
          </span>
        </div>
      </div>`).join("");
  } catch (e) {
    box.innerHTML = `<div class="error">${e.message}</div>`;
  }
}

async function deleteCampaign(id) {
  if (!confirm("Удалить кампанию и все её расписания?")) return;
  try { await api(`/api/campaigns/${id}`, { method: "DELETE" }); loadCampaigns(); }
  catch (e) { alert(e.message); }
}

document.getElementById("fab-new").onclick = () => {
  openModal(`
    <h3>🚀 Новая кампания</h3>
    <input id="new-name" placeholder="Название кампании" />
    <textarea id="new-text" placeholder="Текст поста. Для уникализации: {вариант1|вариант2}"></textarea>
    <label class="row"><span>Spintax</span><input type="checkbox" id="new-spintax" style="width:auto"/></label>
    <button class="btn-primary" onclick="createCampaign()">Создать</button>
  `);
};

async function createCampaign() {
  const name = document.getElementById("new-name").value.trim();
  const text = document.getElementById("new-text").value.trim();
  const spintax = document.getElementById("new-spintax").checked;
  if (!name || !text) { alert("Заполните название и текст"); return; }
  try {
    await api("/api/campaigns", { method: "POST", body: JSON.stringify({ name, text, spintax_enabled: spintax }) });
    closeModal();
    loadCampaigns();
  } catch (e) { alert(e.message); }
}

let selectedDays = [];

async function openSchedules(campaignId) {
  selectedDays = [];
  let groups = [];
  try { groups = await api("/api/groups"); } catch (e) {}
  const groupOptions = groups.map(g => `<option value="${g.chat_id}">${g.title}</option>`).join("");
  const dayButtons = DAYS.map(([val, label]) => `<span class="day-btn" data-day="${val}" onclick="toggleDay(this)">${label}</span>`).join("");
  openModal(`
    <h3>📅 Новое расписание</h3>
    <select id="sched-group">${groupOptions || '<option value="">Нет добавленных групп</option>'}</select>
    <div style="margin-bottom:10px">${dayButtons}</div>
    <input id="sched-time" type="time" value="12:00" />
    <button class="btn-primary" onclick="createSchedule('${campaignId}')">Добавить расписание</button>
  `);
}

function toggleDay(el) {
  const day = el.dataset.day;
  el.classList.toggle("sel");
  selectedDays = selectedDays.includes(day) ? selectedDays.filter(d => d !== day) : [...selectedDays, day];
}

async function createSchedule(campaignId) {
  const chatId = document.getElementById("sched-group").value;
  const time = document.getElementById("sched-time").value;
  if (!chatId) { alert("Выберите группу (сначала добавьте её через /addhere в боте)"); return; }
  if (!selectedDays.length) { alert("Выберите хотя бы один день"); return; }
  try {
    await api(`/api/campaigns/${campaignId}/schedules`, {
      method: "POST",
      body: JSON.stringify({ chat_id: chatId, days: selectedDays, time })
    });
    closeModal();
    loadCampaigns();
  } catch (e) { alert(e.message); }
}

async function loadGroups() {
  const box = document.getElementById("groups-list");
  box.innerHTML = '<div class="empty">Загрузка...</div>';
  try {
    const groups = await api("/api/groups");
    box.innerHTML = groups.length ? groups.map(g => `
      <div class="card row">
        <div>
          <div>${g.title || "Без названия"}</div>
          <div class="muted">${g.type || ""} · ID ${g.chat_id}</div>
        </div>
      </div>`).join("") : '<div class="empty">Групп пока нет — добавьте бота в группу и напишите /addhere</div>';
  } catch (e) {
    box.innerHTML = `<div class="error">${e.message}</div>`;
  }
}

init();
</script>
</body>
</html>
